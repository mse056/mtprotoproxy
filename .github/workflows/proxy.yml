name: Telegram MTProto Proxy

on:
  workflow_dispatch:

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install MTProto Proxy
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip
          git clone https://github.com/alexbers/mtprotoproxy
          cd mtprotoproxy
          pip3 install cryptography
      
      - name: Generate Secret and Config
        run: |
          cd mtprotoproxy
          # Generate random secret
          SECRET=$(python3 -c "import secrets; print(secrets.token_hex(16))")
          echo "SECRET=$SECRET" >> $GITHUB_ENV
          
          # Create config file - USING PORT 8443 (NOT 443)
          cat > config.py << EOF
          PORT = 8443
          USERS = {"tg": "$SECRET"}
          EOF
          
          echo "Config created successfully with port 8443"
      
      - name: Get Server IP
        run: |
          PUBLIC_IP=$(curl -s https://api.ipify.org)
          echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV
          echo "Server IP: $PUBLIC_IP"
      
      - name: Create Proxy Link
        run: |
          PROXY_LINK="tg://proxy?server=${{ env.PUBLIC_IP }}&port=8443&secret=${{ env.SECRET }}"
          echo "$PROXY_LINK" > proxy_link.txt
          echo "============================================="
          echo "YOUR PROXY LINK:"
          echo "$PROXY_LINK"
          echo "============================================="
      
      - name: Upload Proxy Link
        uses: actions/upload-artifact@v4
        with:
          name: proxy-link
          path: proxy_link.txt
      
      - name: Start Proxy Server
        run: |
          cd mtprotoproxy
          # Start the proxy in background
          python3 mtprotoproxy.py &
          PROXY_PID=$!
          echo "PROXY_PID=$PROXY_PID" >> $GITHUB_ENV
          
          # Wait for proxy to start
          sleep 5
          
          # Check if running
          if ps -p $PROXY_PID > /dev/null 2>&1; then
            echo "✅ Proxy is running on port 8443"
          else
            echo "❌ Proxy failed to start"
            exit 1
          fi
      
      - name: Keep Proxy Alive
        run: |
          echo ""
          echo "============================================="
          echo "✅ PROXY IS RUNNING!"
          echo "============================================="
          echo ""
          echo "1. Download the artifact from below"
          echo "2. Open proxy_link.txt"
          echo "3. Copy the tg:// link"
          echo "4. In Telegram: Settings → Advanced → Connection Type"
          echo "5. Paste the link"
          echo ""
          echo "Proxy will run for 6 HOURS"
          echo "Port: 8443"
          echo ""
          echo "============================================="
          
          # Keep alive for 6 hours
          sleep 6h
