name: Run Personal MTProto Proxy

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install MTProto Proxy
        run: |
          git clone https://github.com/alexbers/mtprotoproxy
          cd mtprotoproxy
          python3 -m venv venv
          source venv/bin/activate
          pip install cryptography
      
      - name: Generate proxy secret and config
        run: |
          cd mtprotoproxy
          # Generate a random secret
          SECRET=$(python3 -c "import secrets; print(secrets.token_hex(16))")
          echo "SECRET=$SECRET" >> $GITHUB_ENV
          
          # Create config
          cat > config.py << EOF
          PORT = 443
          USERS = {"tg": "$SECRET"}
          EOF
      
      - name: Get public IP and create proxy link
        run: |
          # Get the GitHub Actions runner's public IP
          PUBLIC_IP=$(curl -s ifconfig.me)
          echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV
          
          # Create the proxy link
          PROXY_LINK="tg://proxy?server=$PUBLIC_IP&port=443&secret=${{ env.SECRET }}"
          echo "$PROXY_LINK" > proxy_link.txt
          echo "=========================================="
          echo "Your proxy link: $PROXY_LINK"
          echo "=========================================="
      
      - name: Upload artifact (THIS CREATES THE DOWNLOAD)
        uses: actions/upload-artifact@v4
        with:
          name: telegram-proxy-link
          path: proxy_link.txt
      
      - name: Start proxy server (runs for 6 hours)
        run: |
          cd mtprotoproxy
          source venv/bin/activate
          python3 mtprotoproxy.py &
          echo "Proxy is running. This job will stay alive for 6 hours..."
          sleep 6h
