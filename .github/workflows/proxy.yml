name: Telegram MTProto Proxy (Fixed)

on:
  workflow_dispatch:

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install MTProto Proxy
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip xxd
          git clone https://github.com/alexbers/mtprotoproxy
          cd mtprotoproxy
          pip3 install cryptography
      
      - name: Generate Correct Fake TLS Secret
        run: |
          cd mtprotoproxy
          
          # Generate random 16 bytes (32 hex chars)
          RANDOM_HEX=$(python3 -c "import secrets; print(secrets.token_hex(16))")
          
          # Internal secret: ee + 32 hex chars (TOTAL = 34 chars)
          INTERNAL_SECRET="ee${RANDOM_HEX}"
          
          # Domain for masking
          FAKE_DOMAIN="varzesh3.com"
          
          # Convert domain to hex
          DOMAIN_HEX=$(echo -n "$FAKE_DOMAIN" | xxd -p -c 1000 | tr -d '\n')
          
          # Published secret: internal secret + domain hex
          PUBLISHED_SECRET="${INTERNAL_SECRET}${DOMAIN_HEX}"
          
          echo "INTERNAL_SECRET=$INTERNAL_SECRET" >> $GITHUB_ENV
          echo "PUBLISHED_SECRET=$PUBLISHED_SECRET" >> $GITHUB_ENV
          echo "FAKE_DOMAIN=$FAKE_DOMAIN" >> $GITHUB_ENV
          
          # IMPORTANT: config.py gets ONLY the 34-char internal secret
          cat > config.py << EOF
          PORT = 8443
          USERS = {"tg": "$INTERNAL_SECRET"}
          TLS_DOMAIN = "$FAKE_DOMAIN"
          EOF
          
          echo "✅ Internal secret (34 chars): ${#INTERNAL_SECRET} chars"
          echo "✅ Published secret length: ${#PUBLISHED_SECRET} chars"
          echo "✅ Domain: $FAKE_DOMAIN"
      
      - name: Get Server IP
        run: |
          PUBLIC_IP=$(curl -s https://api.ipify.org)
          echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV
      
      - name: Create Proxy Link
        run: |
          # Use PUBLISHED_SECRET (includes domain) for the link
          PROXY_LINK="tg://proxy?server=${{ env.PUBLIC_IP }}&port=8443&secret=${{ env.PUBLISHED_SECRET }}"
          echo "$PROXY_LINK" > proxy_link.txt
          echo "============================================="
          echo "YOUR PROXY LINK:"
          echo "$PROXY_LINK"
          echo "============================================="
      
      - name: Upload Proxy Link
        uses: actions/upload-artifact@v4
        with:
          name: fixed-proxy-link
          path: proxy_link.txt
      
      - name: Start Proxy Server
        run: |
          cd mtprotoproxy
          python3 mtprotoproxy.py &
          PROXY_PID=$!
          sleep 5
          
          if ps -p $PROXY_PID > /dev/null 2>&1; then
            echo "✅ Proxy running on port 8443"
            echo "✅ Internal secret: ${{ env.INTERNAL_SECRET }}"
          else
            echo "❌ Proxy failed"
            exit 1
          fi
      
      - name: Keep Proxy Alive
        run: |
          echo ""
          echo "============================================="
          echo "✅ PROXY IS RUNNING!"
          echo "============================================="
          echo ""
          echo "1. Download the artifact"
          echo "2. Copy the tg:// link"
          echo "3. In Telegram: Settings → Advanced → Connection Type"
          echo "4. Add MTProto proxy and paste the link"
          echo ""
          echo "Domain: ${{ env.FAKE_DOMAIN }}"
          echo "Proxy runs for 6 HOURS"
          echo ""
          sleep 6h
